version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: inventory_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: verysecretpassw0rd
      POSTGRES_DB: InventoryDb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: